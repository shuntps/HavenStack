version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Toronto"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"

  - package-ecosystem: "docker-compose"
    directories:
      - "/unraid/edge"
      - "/unraid/apps"
      - "/unraid/nextcloud"
      - "/unraid/servarr"
      - "/unraid/monitoring"
      - "/nas/plex"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "America/Toronto"
    open-pull-requests-limit: 10
    groups:
      routine-image-updates:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore"
      include: "scope"
