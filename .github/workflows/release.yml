name: Create GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate-compose:
    uses: ./.github/workflows/validate-compose.yml

  validate-docs:
    uses: ./.github/workflows/validate-docs.yml

  release:
    name: Create release
    needs:
      - validate-compose
      - validate-docs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "HavenStack ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag
