theme: 'dark'

server:
  address: 'tcp://:9091/'
  disable_healthcheck: true
  endpoints:
    authz:
      forward-auth:
        implementation: 'ForwardAuth'

log:
  level: 'info'
  format: 'json'

telemetry:
  metrics:
    enabled: true
    address: 'tcp://:9959/metrics'

totp:
  disable: false
  issuer: '{{ env "DOMAIN" }}'

webauthn:
  disable: false
  display_name: '{{ env "DOMAIN" }}'

identity_validation:
  reset_password:
    jwt_lifespan: '5m'
    jwt_algorithm: 'HS256'
    jwt_secret: '{{ env "AUTH_JWT_SECRET" }}'

  elevated_session:
    code_lifespan: '5m'
    elevation_lifespan: '10m'
    characters: 8
    require_second_factor: false
    skip_second_factor: false

authentication_backend:
  password_change:
    disable: false

  password_reset:
    disable: false

  refresh_interval: '5m'

  file:
    path: '/config/users.yml'
    watch: true
    password:
      algorithm: 'argon2'
      argon2:
        variant: 'argon2id'
        iterations: 3
        memory: 65536
        parallelism: 4
        key_length: 32
        salt_length: 16

password_policy:
  standard:
    enabled: true
    min_length: 14
    max_length: 0

access_control:
  default_policy: 'deny'
  rules:
    - domain: 'auth.{{ env "DOMAIN" }}'
      policy: 'bypass'

    - domain: 'traefik.{{ env "DOMAIN" }}'
      subject:
        - 'group:admins'
      policy: 'two_factor'

    - domain: 'traefik.{{ env "DOMAIN" }}'
      policy: 'deny'

    - domain: 'grafana.{{ env "DOMAIN" }}'
      subject:
        - 'group:admins'
      policy: 'two_factor'

    - domain: 'grafana.{{ env "DOMAIN" }}'
      policy: 'deny'

    - domain: 'arcane.{{ env "DOMAIN" }}'
      subject:
        - 'group:admins'
      policy: 'two_factor'

    - domain: 'arcane.{{ env "DOMAIN" }}'
      policy: 'deny'

    - domain: 'vault.{{ env "DOMAIN" }}'
      resources:
        - '^/admin([/?].*)?$'
      subject:
        - 'group:admins'
      policy: 'two_factor'

    - domain: 'vault.{{ env "DOMAIN" }}'
      resources:
        - '^/admin([/?].*)?$'
      policy: 'deny'

    - domain: 'prowlarr.{{ env "DOMAIN" }}'
      subject:
        - 'group:admins'
      policy: 'two_factor'

    - domain: 'prowlarr.{{ env "DOMAIN" }}'
      policy: 'deny'

    - domain: 'radarr.{{ env "DOMAIN" }}'
      subject:
        - 'group:admins'
      policy: 'two_factor'

    - domain: 'radarr.{{ env "DOMAIN" }}'
      policy: 'deny'

    - domain: 'sonarr.{{ env "DOMAIN" }}'
      subject:
        - 'group:admins'
      policy: 'two_factor'

    - domain: 'sonarr.{{ env "DOMAIN" }}'
      policy: 'deny'

    - domain: 'profilarr.{{ env "DOMAIN" }}'
      subject:
        - 'group:admins'
      policy: 'two_factor'

    - domain: 'profilarr.{{ env "DOMAIN" }}'
      policy: 'deny'

    - domain: '*.{{ env "DOMAIN" }}'
      policy: 'one_factor'

session:
  name: '{{ env "DOMAIN_SLD" }}_session'
  secret: '{{ env "AUTH_SESSION_SECRET" }}'
  same_site: 'strict'
  inactivity: '10m'
  expiration: '1h'
  remember_me: -1
  cookies:
    - domain: '{{ env "DOMAIN" }}'
      authelia_url: 'https://auth.{{ env "DOMAIN" }}'
      default_redirection_url: 'https://traefik.{{ env "DOMAIN" }}'

regulation:
  max_retries: 3
  find_time: '5m'
  ban_time: '15m'

storage:
  encryption_key: '{{ env "AUTH_STORAGE_ENCRYPTION_KEY" }}'
  local:
    path: '/data/db.sqlite3'

notifier:
  filesystem:
    filename: '/config/notification.txt'
